# Qwen2.5-7B-Instruct GGUF — 공식 llama.cpp 서버
# -hf 플래그로 모델 자동 다운로드, Dockerfile 불필요
# OpenAI 호환 API: /v1/chat/completions, /health
services:
  qwen2x5_7b:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen2x5-7b
    restart: no

    ports:
      - "8004:8000"

    volumes:
      - hf_cache_llm:/root/.cache/llama.cpp

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    command: >
      -hf Qwen/Qwen2.5-7B-Instruct-GGUF
      --hf-file qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf
      --host 0.0.0.0
      --port 8000
      --alias qwen2.5-7b
      --n-gpu-layers -1
      --ctx-size 4096
      --parallel 3

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  hf_cache_llm:
